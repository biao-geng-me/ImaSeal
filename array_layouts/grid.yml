# Optional: use YAML but still define a regular grid
# This demonstrates rows/cols/spacing fallback mode.
units: mm
unit_arrays:
  grid:
    rows: 2
    cols: 2
    spacing: 30

instances:
  - id: left_cluster
    unit: grid
    center: [0, 80]
    heading_deg: 0
    scale: 1.0

  - id: right_cluster
    unit: grid
    center: [0, -80]
    heading_deg: 0
    scale: 1.0
